<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动古诗：早梅 · 张谓 (中英双语·词解版)</title>
    
    <!-- 样式 -->
    <link rel="stylesheet" href="style.css">
    
    <!-- 数据包 -->
    <script src="text.js"></script>
    <script src="translation.js"></script>
    <script src="analysis.js"></script>
    <script src="quiz.js"></script>
    <script src="shortq.js"></script>
    
    <!-- 核心逻辑 -->
    <script src="script.js"></script>

    <style>
        /* 弹窗响应式样式 */
        .floating-tooltip {
            position: fixed !important;
            z-index: 9999 !important;
            background: #ffffff !important;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1) !important;
            border-radius: 12px !important;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease !important;
        }

        @media (max-width: 768px) {
            .floating-tooltip {
                position: fixed !important;
                top: 50% !important;
                left: 50% !important;
                bottom: auto !important;
                right: auto !important;
                transform: translate(-50%, -40%) scale(0.9) !important;
                width: 88% !important;
                max-width: 340px !important;
                border-radius: 16px !important;
                padding: 20px 20px 24px 20px !important;
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.2) !important;
                box-sizing: border-box !important;
                opacity: 0;
            }
            
            .floating-tooltip.show {
                transform: translate(-50%, -50%) scale(1) !important;
                opacity: 1 !important;
            }

            .floating-tooltip::after {
                content: "点击空白处关闭";
                display: block;
                text-align: center;
                font-size: 0.75rem;
                color: #94a3b8;
                margin-top: 16px;
                border-top: 1px dashed #f1f5f9;
                padding-top: 8px;
            }
        }
    </style>
</head>
<body>
 
<div class="app-container">

    <div class="header-section" style="text-align: center !important; margin-bottom: 30px !important;">
        <h1 class="title" style="font-family: 'Noto Serif SC', 'SimSun', serif !important; font-size: 2.5rem !important; font-weight: bold !important; color: #0f172a !important; margin-bottom: 12px !important; letter-spacing: 2px !important;">早梅</h1>
        
        <div class="author-wrapper" style="display: flex !important; align-items: center !important; justify-content: center !important; gap: 15px !important; max-width: 600px !important; margin: 0 auto !important;">
            <div style="flex: 1 !important; height: 1px !important; background: linear-gradient(to left, #cbd5e1, transparent) !important;"></div>
            <p class="author" style="font-size: 0.95rem !important; color: #64748b !important; margin: 0 !important; white-space: nowrap !important; font-family: system-ui, -apple-system, sans-serif !important; letter-spacing: 0.5px !important;">
                张谓（唐）/ Zhang Wei (Tang Dynasty)
            </p>
            <div style="flex: 1 !important; height: 1px !important; background: linear-gradient(to right, #cbd5e1, transparent) !important;"></div>
        </div>
    </div>
    
    <!-- 韵文展示 -->
    <div class="poem-container">
        <div id="dynamic-poem-container"></div>
        
        <div class="translation-block" id="translationBlock">
            <div class="translation-header" id="translationHeader">
                <div class="translation-title"><span>📖</span> 白话翻译</div>
                <div class="toggle-icon" id="toggleIcon">▶</div>
            </div>
            <div class="translation-content" id="translationContent"></div>
        </div>
    </div>
    
    <!-- 控制开关 -->
    <div class="controls-wrapper">
        <div class="control-panel"><div class="control-label">🗣️ 拼音辅助 <span>(Pinyin)</span></div><label class="switch"><input type="checkbox" id="pinyin-toggle"><span class="slider"></span></label></div>
        <div class="control-panel"><div class="control-label">🔤 英文辅助 <span>(English)</span></div><label class="switch"><input type="checkbox" id="en-toggle"><span class="slider"></span></label></div>
    </div>

    <!-- 功能按钮 -->
    <div class="action-group">
        <button class="action-btn btn-analysis" id="toggle-analysis-btn"><span class="btn-icon">📜</span> 展开全诗赏析</button>
        <button class="action-btn btn-quiz" id="toggle-quiz-btn"><span class="btn-icon">🎯</span> 客观题自测</button>
        <button class="action-btn btn-shortq" id="toggle-shortq-btn"><span class="btn-icon">✍️</span> 简答题特训</button>
    </div>
 
    <!-- 折叠内容区 -->
    <div class="collapsible-content" id="analysis-content"></div>
    <div class="collapsible-content" id="quiz-content"><div id="quiz-dynamic-container"></div></div>
    <div class="collapsible-content" id="shortq-content"></div>

</div>
 
<!-- 悬浮词解弹窗 -->
<div class="floating-tooltip" id="tooltip">
    <div class="exp-header"><span class="exp-word" id="disp-word"></span><span class="exp-pinyin" id="disp-pinyin"></span><span class="exam-tag" id="exam-tag">考点</span></div>
    <div class="exp-zh" id="disp-zh"></div>
    <div class="exp-en" id="disp-en"></div>
</div>
 
</body>
</html>
